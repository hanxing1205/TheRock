name: HUD Data Sync
on:
  schedule:
    - cron: "*/30 * * * *"   # 每 30 分钟
  workflow_dispatch:

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests psycopg2-binary
      - run: python collector/sync_github_actions.py
        env:
          GITHUB_TOKEN: ${{ secrets.HUD_SYNC_TOKEN }}
          DATABASE_URL: ${{ secrets.HUD_DATABASE_URL }}
