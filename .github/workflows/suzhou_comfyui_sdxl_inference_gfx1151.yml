#
# Suzhou Lab — ComfyUI SDXL inference smoke (v2, gfx1151 self-hosted runner)
#
# Differences from suzhou_comfyui_sdxl_gfx1151.yml:
#   - Does NOT run the shunit2 test_comfyui_*.sh script (no sudo, no 2h custom_nodes pip).
#   - Starts ComfyUI with --disable-all-custom-nodes, runs workflow_inference.py directly.
#   - Parses Average Inference Time from history JSON (robust vs script batch_size bug).
#
# Kernel A/B: switch /boot/vmlinuz + initrd.img and reboot BEFORE dispatching.
# Record kernel with kernel_note input (e.g. 6.19-baseline / 7.1-candidate / 7.0-repro).
#
# Prerequisites on runner (138):
#   - test_case at TEST_CASE_DIR with ComfyUI checkout + SDXL model symlink
#   - workflow/stable-diffusion-xl-base-1.0.json in the suite directory
#   - Optional: TheRock build/dist/rocm for runtime libs
#
# NOTE: hanxing1205/TheRock restricts third-party Actions. Shell/git only.

name: Suzhou ComfyUI SDXL Inference gfx1151

on:
  workflow_dispatch:
    inputs:
      kernel_note:
        description: "Human label for active kernel (e.g. 6.19-baseline / 7.1-candidate)"
        type: string
        default: ""
      test_case_dir:
        description: "Absolute path to test_case repo on the runner"
        type: string
        default: "/home/hx/actions-runner/test_case"
      rocm_dist:
        description: "ROCm dist path (empty = <workspace>/build/dist/rocm)"
        type: string
        default: ""
      torch_pip_index:
        description: "pip --index-url for ROCm PyTorch wheels (empty = skip torch install step)"
        type: string
        default: "https://rocm.nightlies.amd.com/v2/gfx1151/"
      install_torch_stack:
        description: "pip install torch+torchvision+torchaudio from torch_pip_index"
        type: boolean
        default: false
      install_comfyui_requirements:
        description: "pip install ComfyUI requirements.txt (torch lines excluded)"
        type: boolean
        default: false
      repeat_times:
        description: "workflow_inference.py repeat_times (5 = 6 runs, first is warmup)"
        type: string
        default: "5"
      sanity_only:
        description: "Only verify paths, torch, GPU — do not run SDXL inference"
        type: boolean
        default: false
      runner_label:
        description: "Suzhou self-hosted GPU runner label"
        type: string
        default: "linux-gfx1151-138"

permissions:
  contents: read

concurrency:
  group: suzhou-comfyui-sdxl-inference-gfx1151
  cancel-in-progress: false

env:
  LOG_DIR: ${{ github.workspace }}/suzhou-ci-logs
  VENV_DIR: ${{ github.workspace }}/.venv-comfyui
  KERNEL_NOTE: ${{ inputs.kernel_note || '' }}
  WORKFLOW_JSON: stable-diffusion-xl-base-1.0.json

jobs:
  comfyui_sdxl_inference:
    name: ComfyUI SDXL Inference @ gfx1151
    runs-on: ${{ inputs.runner_label || 'linux-gfx1151-138' }}
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository (git, no third-party action)
        run: |
          set -euo pipefail
          repo_url="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          if [[ -d .git ]]; then
            git remote set-url origin "${repo_url}"
            git fetch --depth 1 origin "${{ github.sha }}"
            git checkout --force FETCH_HEAD
            git reset --hard FETCH_HEAD
          else
            git clone --depth 1 "${repo_url}" .
            git checkout "${{ github.sha }}"
          fi
          git rev-parse HEAD
          git log -1 --oneline

      - name: Record runner and kernel info
        run: |
          mkdir -p "${LOG_DIR}" logs
          kver="$(uname -r)"
          {
            echo "## Suzhou Lab ComfyUI SDXL Inference (v2)"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Runner | ${{ runner.name }} |"
            echo "| Kernel (uname -r) | \`${kver}\` |"
            echo "| Kernel note | ${KERNEL_NOTE:-n/a} |"
            echo "| TEST_CASE_DIR | ${{ inputs.test_case_dir }} |"
            echo "| Workflow | ${WORKFLOW_JSON} |"
            echo "| repeat_times | ${{ inputs.repeat_times || '5' }} |"
            echo "| GitHub Run | ${GITHUB_RUN_ID} |"
          } >> "${GITHUB_STEP_SUMMARY}"
          {
            echo "date_utc=$(date -u --iso-8601=seconds)"
            echo "kernel=${kver}"
            echo "kernel_note=${KERNEL_NOTE}"
            echo "github_run_id=${GITHUB_RUN_ID}"
          } | tee "${LOG_DIR}/comfyui-inference-context.txt"

      - name: Resolve paths and preflight checks
        id: paths
        run: |
          set -euo pipefail
          TEST_CASE_DIR="${{ inputs.test_case_dir }}"
          SUITE_DIR="${TEST_CASE_DIR}/suites/comfyui_text_to_image"
          WORKFLOW_FILE="${SUITE_DIR}/workflow/${WORKFLOW_JSON}"

          if [[ ! -d "${SUITE_DIR}" ]]; then
            echo "::error::SUITE_DIR not found: ${SUITE_DIR}"
            exit 1
          fi
          if [[ ! -f "${WORKFLOW_FILE}" ]]; then
            echo "::error::Missing workflow JSON: ${WORKFLOW_FILE}"
            echo "Add stable-diffusion-xl-base-1.0.json to test_case workflow/ on the runner."
            exit 1
          fi
          if [[ ! -d "${SUITE_DIR}/ComfyUI" ]]; then
            echo "::error::ComfyUI not found under ${SUITE_DIR}/ComfyUI"
            echo "Clone ComfyUI once on the runner (or run legacy workflow once)."
            exit 1
          fi
          if [[ ! -e "${SUITE_DIR}/ComfyUI/models/checkpoints/sd_xl_base_1.0.safetensors" ]]; then
            echo "::error::SDXL checkpoint missing: ComfyUI/models/checkpoints/sd_xl_base_1.0.safetensors"
            exit 1
          fi

          if [[ -n "${{ inputs.rocm_dist }}" ]]; then
            ROCM_DIST="${{ inputs.rocm_dist }}"
          else
            ROCM_DIST="${{ github.workspace }}/build/dist/rocm"
          fi

          echo "suite_dir=${SUITE_DIR}" >> "${GITHUB_OUTPUT}"
          echo "workflow_file=${WORKFLOW_FILE}" >> "${GITHUB_OUTPUT}"
          echo "SUITE_DIR=${SUITE_DIR}" >> "${GITHUB_ENV}"
          echo "ROCM_DIST=${ROCM_DIST}" >> "${GITHUB_ENV}"
          ls -la "${WORKFLOW_FILE}"
          ls -la "${SUITE_DIR}/ComfyUI/models/checkpoints/sd_xl_base_1.0.safetensors"

      - name: Pre-job cleanup GPU processes
        timeout-minutes: 5
        run: |
          if [[ -x ./build_tools/github_actions/cleanup_processes.sh ]]; then
            bash ./build_tools/github_actions/cleanup_processes.sh
          fi
          pkill -f "ComfyUI/main.py" 2>/dev/null || true
          pkill -f "run_comfyui_server.py" 2>/dev/null || true
          sleep 2

      - name: Setup Python venv
        run: |
          set -euo pipefail
          if [[ ! -d "${VENV_DIR}" ]]; then
            python3 -m venv "${VENV_DIR}"
          fi
          # shellcheck source=/dev/null
          source "${VENV_DIR}/bin/activate"
          pip install --upgrade pip
          pip install websocket-client pandas
          python -V

      - name: Optional PyTorch stack install
        if: ${{ inputs.install_torch_stack && inputs.torch_pip_index != '' }}
        run: |
          # shellcheck source=/dev/null
          source "${VENV_DIR}/bin/activate"
          pip install torch torchvision torchaudio \
            --index-url "${{ inputs.torch_pip_index }}"

      - name: Optional ComfyUI requirements install
        if: ${{ inputs.install_comfyui_requirements }}
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source "${VENV_DIR}/bin/activate"
          req="${SUITE_DIR}/ComfyUI/requirements.txt"
          grep -vE '^(torch|torchvision|torchaudio)($|[<=>])' "${req}" \
            > "${LOG_DIR}/comfyui_requirements_no_torch.txt"
          pip install -r "${LOG_DIR}/comfyui_requirements_no_torch.txt" \
            --index-url https://mirrors.aliyun.com/pypi/simple/

      - name: Export ROCm runtime environment
        run: |
          set -euo pipefail
          if [[ -d "${ROCM_DIST}/bin" ]]; then
            echo "PATH=${ROCM_DIST}/bin:${PATH}" >> "${GITHUB_ENV}"
          fi
          if [[ -d "${ROCM_DIST}/lib" ]]; then
            echo "LD_LIBRARY_PATH=${ROCM_DIST}/lib:${ROCM_DIST}/lib/rocm_sysdeps/lib:${LD_LIBRARY_PATH:-}" >> "${GITHUB_ENV}"
            echo "ROCM_PATH=${ROCM_DIST}" >> "${GITHUB_ENV}"
          fi

      - name: Verify PyTorch GPU
        run: |
          # shellcheck source=/dev/null
          source "${VENV_DIR}/bin/activate"
          python3 - <<'PY'
          import torch
          ok = torch.cuda.is_available()
          print(f"torch={torch.__version__} cuda_available={ok}")
          if not ok:
              raise SystemExit(
                  "torch.cuda.is_available() is False. "
                  "Enable install_torch_stack or pre-install ROCm PyTorch in .venv-comfyui."
              )
          print(f"device={torch.cuda.get_device_name(0)}")
          PY

      - name: Sanity only — skip inference
        if: ${{ inputs.sanity_only }}
        run: |
          echo "sanity_only=true — paths, torch, and GPU checks passed."

      - name: Run SDXL inference
        id: infer
        if: ${{ inputs.sanity_only != true }}
        working-directory: ${{ env.SUITE_DIR }}
        run: |
          set -euo pipefail
          # shellcheck source=/dev/null
          source "${VENV_DIR}/bin/activate"

          OUT_DIR="stable-diffusion-xl-base-1.0"
          rm -rf "${OUT_DIR}/history"[0-9].json 2>/dev/null || true
          mkdir -p "${OUT_DIR}"

          SERVER_LOG="${{ github.workspace }}/logs/comfyui_server_${GITHUB_RUN_ID}.log"
          INFER_LOG="${{ github.workspace }}/logs/comfyui_inference_${GITHUB_RUN_ID}.log"
          mkdir -p "${{ github.workspace }}/logs"

          cd ComfyUI
          nohup python3 main.py --listen --log-stdout --disable-all-custom-nodes \
            > "${SERVER_LOG}" 2>&1 &
          echo "${!}" > "${LOG_DIR}/comfyui_server.pid"
          cd ..

          echo "Waiting for ComfyUI on :8188..."
          ready=0
          for _ in $(seq 1 90); do
            if curl -sf --max-time 2 http://127.0.0.1:8188/ >/dev/null; then
              ready=1
              break
            fi
            sleep 2
          done
          if [[ "${ready}" -ne 1 ]]; then
            echo "::error::ComfyUI did not start on :8188 within 180s"
            tail -80 "${SERVER_LOG}" || true
            exit 1
          fi
          echo "ComfyUI is up."

          set +e
          python3 scripts/workflow_inference.py \
            --workflow "${WORKFLOW_JSON}" \
            --model_feature text2image \
            --model_type SDXL \
            --repeat_times "${{ inputs.repeat_times || '5' }}" \
            2>&1 | tee "${INFER_LOG}"
          infer_rc=${PIPESTATUS[0]}
          set -e
          echo "workflow_inference.py exit code: ${infer_rc} (batch_size bug may cause non-zero)"
          export INFER_RC="${infer_rc}"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          out_dir = Path("stable-diffusion-xl-base-1.0")
          repeat = int(os.environ.get("REPEAT_TIMES", "5"))
          nruns = repeat + 1

          def exec_sec(prompt_data):
              if "status" not in prompt_data:
                  for v in prompt_data.values():
                      if isinstance(v, dict) and "status" in v:
                          prompt_data = v
                          break
              msgs = prompt_data.get("status", {}).get("messages", [])
              start = end = None
              for et, ed in msgs:
                  if et == "execution_start":
                      start = ed["timestamp"]
                  elif et == "execution_success":
                      end = ed["timestamp"]
              return (end - start) / 1000 if start and end else None

          times = []
          for i in range(nruns):
              p = out_dir / f"history{i}.json"
              if not p.exists():
                  print(f"::error::Missing {p}")
                  raise SystemExit(1)
              t = exec_sec(json.loads(p.read_text()))
              if t is None:
                  print(f"::error::Could not parse timing from {p}")
                  raise SystemExit(1)
              times.append(t)
              print(f"run {i}: {t:.2f}s")

          first = times[0]
          avg = sum(times[1:]) / len(times[1:]) if len(times) > 1 else first
          print(f"First Inference Time = {first:.2f} seconds")
          print(f"Average Inference Time = {avg:.2f} seconds")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"first_inference_sec={first:.2f}\n")
              f.write(f"average_inference_sec={avg:.2f}\n")
              f.write(f"infer_rc={os.environ.get('INFER_RC', '0')}\n")
          PY
        env:
          REPEAT_TIMES: ${{ inputs.repeat_times || '5' }}

      - name: Write inference summary
        if: ${{ inputs.sanity_only != true && steps.infer.outcome != 'skipped' }}
        run: |
          {
            echo ""
            echo "### ComfyUI SDXL inference result"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Kernel | \`$(uname -r)\` |"
            echo "| Kernel note | ${KERNEL_NOTE:-n/a} |"
            echo "| First Inference Time (s) | ${{ steps.infer.outputs.first_inference_sec || 'n/a' }} |"
            echo "| **Average Inference Time (s)** | **${{ steps.infer.outputs.average_inference_sec || 'n/a' }}** |"
            echo ""
            echo "Compare **Average Inference Time** across kernel runs."
            echo "Canonical reference: ~9s good vs ~388s bad (40×)."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Archive logs on runner
        if: always()
        run: |
          mkdir -p "${LOG_DIR}"
          cp -a logs/. "${LOG_DIR}/" 2>/dev/null || true
          if [[ -d "${SUITE_DIR}/stable-diffusion-xl-base-1.0" ]]; then
            cp -a "${SUITE_DIR}/stable-diffusion-xl-base-1.0/history"[0-9].json \
              "${LOG_DIR}/" 2>/dev/null || true
          fi
          ls -la "${LOG_DIR}" || true

      - name: Post-job cleanup
        if: always()
        timeout-minutes: 5
        run: |
          if [[ -x ./build_tools/github_actions/cleanup_processes.sh ]]; then
            bash ./build_tools/github_actions/cleanup_processes.sh
          fi
          if [[ -f "${LOG_DIR}/comfyui_server.pid" ]]; then
            kill "$(cat "${LOG_DIR}/comfyui_server.pid")" 2>/dev/null || true
          fi
          pkill -f "ComfyUI/main.py" 2>/dev/null || true
